name: ${PROJECT_NAME:-retro_hotel}

services:
  proxy:
    image: caddy:2.8-alpine
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nitro
      - assets
      - cms
      - arcturus
    restart: unless-stopped
    networks:
      - public
      - nitro

  arcturus:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-arcturus:${IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./vendor/nitro-docker/.env
    volumes:
      - ./vendor/nitro-docker/assets/:/app/assets/
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nitro

  nitro:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-nitro:${IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./vendor/nitro-docker/.env
    volumes:
      - ./vendor/nitro-docker/nitro/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./vendor/nitro-docker/nitro/renderer-config.json:/usr/share/nginx/html/renderer-config.json:ro
      - ./vendor/nitro-docker/nitro/ui-config.json:/usr/share/nginx/html/ui-config.json:ro
    restart: unless-stopped
    networks:
      - nitro

  db:
    image: mysql:8
    env_file:
      - ./vendor/nitro-docker/.env
    volumes:
      - ./vendor/nitro-docker/db/data:/var/lib/mysql
      - ./vendor/nitro-docker/db/conf.d:/etc/mysql/conf.d:ro
      - ./vendor/nitro-docker/db/dumps:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks:
      - nitro

  backup:
    image: tiredofit/db-backup:4.0.19
    volumes:
      - ./vendor/nitro-docker/db/backup:/backup
    environment:
      - TIMEZONE=UTC
      - CONTAINER_ENABLE_MONITORING=FALSE
      - DEFAULT_LOG_LEVEL=WARN
      - DEFAULT_CREATE_LATEST_SYMLINK=FALSE
      - BACKUP_JOB_CONCURRENCY=1
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=GZ
      - DEFAULT_BACKUP_INTERVAL=1440
      - DEFAULT_BACKUP_BEGIN=0315
      - DEFAULT_CLEANUP_TIME=10080
      - DB01_TYPE=mysql
      - DB01_HOST=db
      - DB01_NAME=${MYSQL_DATABASE:-arcturus}
      - DB01_USER=${MYSQL_USER:-arcturus_user}
      - DB01_PASS=${MYSQL_PASSWORD:-change_me}
    restart: unless-stopped
    networks:
      - nitro

  assets:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - imager
      - imgproxy
    env_file:
      - ./vendor/nitro-docker/.env
    volumes:
      - ./vendor/nitro-docker/assets/nginx:/etc/nginx/conf.d/:ro
      - ./vendor/nitro-docker/assets/:/usr/share/nginx/html
    networks:
      - nitro

  imager:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-imager:${IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./vendor/nitro-docker/.env
    volumes:
      - ./vendor/nitro-docker/assets/:/app/assets/
    restart: unless-stopped
    networks:
      - nitro

  imgproxy:
    image: ghcr.io/willnorris/imageproxy
    volumes:
      - ./vendor/nitro-docker/assets/usercontent/imageproxy/cache:/tmp/imageproxy
    env_file:
      - ./vendor/nitro-docker/.env
    restart: unless-stopped
    networks:
      - nitro

  cms:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-cms:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      assets:
        condition: service_started
      arcturus:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./vendor/nitro-docker/.cms.env:/var/www/html/.env
      - ./vendor/nitro-docker/atomcms/storage:/var/www/html/storage/app/public
      - ./vendor/nitro-docker/atomcms/logs:/var/www/html/storage/logs
      - ./vendor/nitro-docker/atomcms/gamedata:/var/www/html/public/gamedata
    restart: unless-stopped
    networks:
      - nitro

networks:
  public:
  nitro:
    internal: false

volumes:
  caddy_data:
  caddy_config:
