name: ${PROJECT_NAME:-retro_hotel}

services:
  proxy:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-proxy:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-25m}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - nitro
      - assets
      - cms
      - arcturus
    restart: unless-stopped
    networks:
      - nitro

  arcturus:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-arcturus:${IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nitro

  nitro:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-nitro:${IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./.env
    environment:
      - NITRO_WEBSOCKET_URL=${NITRO_WEBSOCKET_URL:?Set NITRO_WEBSOCKET_URL}
      - NITRO_ASSET_URL=${NITRO_ASSET_URL:-/assets}
      - NITRO_IMAGE_LIBRARY_URL=${NITRO_IMAGE_LIBRARY_URL:-/swf/c_images/}
      - NITRO_HOF_FURNI_URL=${NITRO_HOF_FURNI_URL:-/swf/dcr/hof_furni/}
      - NITRO_CAMERA_URL=${NITRO_CAMERA_URL:-/usercontent/camera}
      - NITRO_CMS_URL=${NITRO_CMS_URL:-}
    restart: unless-stopped
    networks:
      - nitro

  db:
    image: mysql:8
    env_file:
      - ./.env
    volumes:
      - db_data:/var/lib/mysql
      - ./db/dumps:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    networks:
      - nitro

  backup:
    image: tiredofit/db-backup:4.0.19
    volumes:
      - ./db/backup:/backup
    environment:
      - TIMEZONE=UTC
      - CONTAINER_ENABLE_MONITORING=FALSE
      - DEFAULT_LOG_LEVEL=WARN
      - DEFAULT_CREATE_LATEST_SYMLINK=FALSE
      - BACKUP_JOB_CONCURRENCY=1
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=GZ
      - DEFAULT_BACKUP_INTERVAL=1440
      - DEFAULT_BACKUP_BEGIN=0315
      - DEFAULT_CLEANUP_TIME=10080
      - DB01_TYPE=mysql
      - DB01_HOST=db
      - DB01_NAME=${MYSQL_DATABASE:-arcturus}
      - DB01_USER=${MYSQL_USER:-arcturus_user}
      - DB01_PASS=${MYSQL_PASSWORD:-change_me}
    restart: unless-stopped
    networks:
      - nitro

  assets:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-assets:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - nitro

  imager:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-imager:${IMAGE_TAG:-latest}
    pull_policy: always
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - nitro

  imgproxy:
    image: ghcr.io/willnorris/imageproxy
    volumes:
      - imageproxy_cache:/tmp/imageproxy
    env_file:
      - ./.env
    restart: unless-stopped
    networks:
      - nitro

  cms:
    image: ${IMAGE_REPOSITORY:?Set IMAGE_REPOSITORY}/${IMAGE_NAME_PREFIX:-tjanoekhotel}-cms:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      assets:
        condition: service_started
      arcturus:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - ./.cms.env:/var/www/html/.env
      - cms_storage:/var/www/html/storage/app/public
      - cms_logs:/var/www/html/storage/logs
    restart: unless-stopped
    networks:
      - nitro

networks:
  nitro:
    internal: false

volumes:
  cms_logs:
  cms_storage:
  db_data:
  imageproxy_cache:
